<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Docspace Portal</title>
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/profile.css">
    <script defer src="scripts/api.js"></script>
    <script defer src="scripts/profile.js"></script>
</head>

<body>
    <header class="site-header">
        <h1>Docspace Profile</h1>
        <div class="top-nav">
            <input type="text" id="searchInput" class="search-input" placeholder="Search documents...">
            <button id="searchBtn" class="btn">Search</button>
            <nav class="site-nav">
                <a href="portal.html">Home</a>
                <a href="documents.html">Documents</a>
                <a href="departments.html">Departments</a>
                <a href="profile.html" class="active">Profile</a>
                <a href="login-signup.html">Logout</a>
            </nav>
        </div>
    </header>

    <main class="profile-wrapper">
        <div class="profile-box">
            <div class="avatar-container">
                <img id="profileAvatar" src="images/random-profile-pic.jpg" alt="Profile">
            </div>

            <div class="profile-header-row">
                <div class="profile-name-block">
                    <h2 id="profileName" class="profile-name">Loading...</h2>
                    <p id="profileRole" class="profile-role"></p>
                </div>

                <div class="profile-settings">
                    <button class="settings-btn" onclick="toggleSettingsMenu()">⚙</button>
                    <div class="settings-dropdown hidden" id="settingsMenu">
                        <a href="#">Update Profile</a>
                        <a href="#">Change Password</a>
                    </div>
                </div>
            </div>

            <div id="profileMeta" class="profile-meta"></div>

            <div class="profile-tabs">
                <button class="tab active" onclick="showTab('activity')">Recent Activity</button>
                <button class="tab" onclick="showTab('pinned')">Pinned Documents</button>
                <button class="tab" onclick="showTab('permissions')">Permissions</button>
            </div>

            <div id="activity" class="tab-panel">
                <div class="activity-grid" id="activityGrid">Loading...</div>
            </div>

            <div id="pinned" class="tab-panel hidden">
                <div class="activity-grid" id="pinnedGrid">Loading...</div>
            </div>

            <div id="permissions" class="tab-panel hidden">
                <div class="activity-grid" id="permissionsGrid">Loading...</div>
            </div>
        </div>
    </main>
</body>

</html>
