<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Usage Dashboard</title>
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" type="text/css" href="styles/dashboard.css">
    <script defer src="scripts/api.js"></script>
    <script defer src="scripts/dashboard.js"></script>
</head>

<body>
    <header class="site-header">
        <h1>API Usage Dashboard</h1>
        <div class="top-nav">
            <input type="text" class="search-input" placeholder="Search endpoints...">
            <button class="btn">Search</button>
            <nav class="site-nav">
                <a href="portal.html">Home</a>
                <a href="documents.html">Documents</a>
                <a href="departments.html">Departments</a>
                <a href="dashboard.html" class="active">API Dashboard</a>
                <a href="chat.html">Chat</a>
                <a href="login-signup.html">Logout</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        <div id="dashboardStatus" class="panel status-line">Loading API metrics...</div>
        <div class="stats">
            <div class="card panel">
                <h3>Total Documents</h3>
                <div id="documentsTotal" class="value">-</div>
            </div>
            <div class="card panel">
                <h3>Pinned Documents</h3>
                <div id="pinnedTotal" class="value">-</div>
            </div>
            <div class="card panel">
                <h3>Total Comments</h3>
                <div id="commentsTotal" class="value">-</div>
            </div>
            <div class="card panel">
                <h3>Stored File Size</h3>
                <div id="storageTotal" class="value">-</div>
            </div>
        </div>

        <div class="table-head">
            <h2 class="section-title">Recent API Activity</h2>
            <a class="chat-cta" href="chat.html">Open Chat</a>
        </div>

        <div class="table-wrap panel">
            <table>
                <thead>
                    <tr>
                        <th>Endpoint</th>
                        <th>Method</th>
                        <th>Status</th>
                        <th>Response Time</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="activityTableBody"></tbody>
            </table>
        </div>
    </main>

    <footer>
        © 2026 Docspace · API Monitoring
    </footer>
</body>

</html>
