<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Document | Docspace Portal</title>
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/documentView.css">
    <script defer src="scripts/api.js"></script>
    <script defer src="scripts/documentView.js"></script>
</head>

<body>
    <header class="site-header">
        <h1>Docspace Portal</h1>
        <div class="top-nav">
            <input type="text" class="search-input" placeholder="Search documents...">
            <nav class="site-nav">
                <a href="portal.html">Home</a>
                <a href="documents.html" class="active">Documents</a>
                <a href="departments.html">Departments</a>
                <a href="dashboard.html">API Dashboard</a>
                <a href="chat.html">Chat</a>
                <a href="login-signup.html">Logout</a>
            </nav>
        </div>
    </header>

    <div class="page-shell main-container">
        <aside class="sidebar">
            <div class="ai-chat panel">
                <h2>AI Assistant</h2>
                <div class="chat-box">
                    <p>Ask me to summarize this document or answer questions about it.</p>
                </div>
                <a class="chat-cta" href="chat.html">Open Chat</a>
            </div>
        </aside>

        <section class="content">
            <div class="document-header panel">
                <div>
                    <h2 id="docTitle">Loading document...</h2>
                    <p id="docMeta" class="muted"></p>
                    <p id="docDescription" class="muted"></p>
                    <p id="docIndexMeta" class="muted"></p>
                </div>
                <div class="document-actions">
                    <a id="openFileBtn" class="btn btn-secondary" href="#" target="_blank" rel="noreferrer">Open
                        File</a>
                    <button id="reindexBtn" class="btn btn-secondary">Reindex</button>
                    <button id="pinBtn" class="btn">Pin Document</button>
                    <button id="deleteBtn" class="btn btn-danger">Delete</button>
                </div>
            </div>

            <div class="document-viewer panel">
                <div id="pageStatus" class="status-line">Loading document...</div>
                <iframe id="docFrame" src="" title="Document Preview"></iframe>
            </div>

            <div class="comments-section panel">
                <h3>Comments</h3>
                <div id="commentsList"></div>

                <form id="commentForm">
                    <input type="text" id="commentAuthor" placeholder="Your name" value="Docspace User">
                    <input type="text" id="commentInput" placeholder="Add a comment...">
                    <button type="submit" class="btn">Post</button>
                </form>
            </div>
        </section>
    </div>
</body>

</html>
