<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments | Docspace Portal</title>
  <link rel="stylesheet" href="styles/shared.css">
  <link rel="stylesheet" href="styles/departments.css">
</head>
<body>

<header>
  <h1>Company Portal</h1>

  <div class="top-bar">
    <input
      type="text"
      id="departmentSearchInput"
      placeholder="Search documents or departments..."
    >

    <nav>
      <a href="portal.html">Home</a>
      <a href="departments.html" class="active">Departments</a>
      <a href="documents.html">Documents</a>
      <a href="dashboard.html">API Dashboard</a>
      <a href="chat.html">Chat</a>
      <a href="login-signup.html">Logout</a>
    </nav>
  </div>
</header>

<main class="page-shell">
  <section class="intro panel">
    <div>
      <h2>Departments</h2>
      <p>Select a department to view its documents and updates.</p>
    </div>
    <a class="chat-cta" href="chat.html">Open Chat</a>
  </section>

  <section id="adminControls" class="admin-controls hidden">
    <div class="admin-controls-header">
      <h3>Department Management</h3>
      <p>Admins can create and delete departments.</p>
    </div>

    <form id="addDepartmentForm" class="add-department-form">
      <div class="form-row">
        <div class="form-group">
          <label for="departmentNameInput">Department Name</label>
          <input
            type="text"
            id="departmentNameInput"
            placeholder="e.g. Operations"
            required
          >
        </div>

        <div class="form-group">
          <label for="departmentDescriptionInput">Description</label>
          <input
            type="text"
            id="departmentDescriptionInput"
            placeholder="e.g. Processes, logistics, workflows"
          >
        </div>
      </div>

      <button type="submit" class="admin-btn">Add Department</button>
    </form>

    <div id="adminMessage" class="admin-message hidden"></div>
  </section>

  <section class="department-grid" id="departmentGrid">
    <p id="departmentsStatus">Loading departments...</p>
  </section>
</main>

<script src="scripts/departments.js"></script>

</body>
</html>
